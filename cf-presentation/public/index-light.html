<!DOCTYPE html>
<html lang="he" dir="rtl" data-template="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצגת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        :root {
            --neon-cyan: #0284c7;
            --neon-purple: #7c3aed;
            --neon-emerald: #059669;
            --dark-bg: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(to bottom right, #fffbeb, #f0f9ff, #e0e7ff);
            background-attachment: fixed;
            color: #1e293b;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .scroll-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y proximity; scroll-behavior: smooth; position: relative; z-index: 10; }
        .slide { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; padding: 2rem; overflow-y: auto; }
        .orb { position: fixed; border-radius: 50%; filter: blur(110px); z-index: 1; opacity: 0.5; animation: float 20s infinite ease-in-out alternate; }
        .orb-1 { width: 40vw; height: 40vw; background: radial-gradient(circle, #c7d2fe 0%, transparent 70%); top: -10%; right: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: radial-gradient(circle, #bae6fd 0%, transparent 70%); bottom: -10%; left: -10%; animation-delay: -5s; }
        .orb-3 { width: 25vw; height: 25vw; background: radial-gradient(circle, #fde68a 0%, transparent 70%); top: 40%; left: 40%; opacity: 0.3; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,30px) scale(1.1); } 100% { transform: translate(30px,-50px) scale(0.9); } }
        /* outer editable wrapper — transparent so inner glass-cards show as designed */
        .cyber-panel {
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            border-radius: 24px;
            padding: 1.5rem;
            width: 100%;
            max-width: 1280px;
            position: relative;
            overflow: visible;
            margin: auto;
        }
        .cyber-panel::before, .cyber-panel::after { display: none; }
        /* ecommerce glass cards */
        .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
        /* neutralize ecommerce .reveal so content is visible inside slides */
        .reveal { opacity: 1; transform: none; }
        .flow-line { stroke-dasharray: 12; }
        .glow-text-cyan { color: #4f46e5; }
        .glow-text-emerald { color: #059669; }
        .scroll-nav { position: fixed; top: 0; left: 0; right: 0; display: flex; flex-direction: row; align-items: center; justify-content: safe center; gap: 0.2rem; z-index: 50; padding: 0.5rem 1rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.08); box-shadow: 0 2px 12px rgba(30,41,59,0.06); overflow-x: auto; }
        .scroll-nav::-webkit-scrollbar { display: none; }
        .nav-link { cursor: pointer; white-space: nowrap; color: #475569; font-size: 0.85rem; font-weight: 600; padding: 0.3rem 0.7rem; border-radius: 8px; transition: color 0.2s; flex-shrink: 0; position: relative; }
        .nav-link:hover { color: #4f46e5; }
        .nav-link.active { color: #4f46e5; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -1px; left: 0.7rem; right: 0.7rem; height: 2px; background: #4f46e5; border-radius: 2px; }
        .reveal-content { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.2,1,0.3,1), transform 0.8s cubic-bezier(0.2,1,0.3,1); }
        .slide.in-view .reveal-content { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.2s; } .delay-2 { transition-delay: 0.4s; } .delay-3 { transition-delay: 0.6s; }
        .tech-box { background: rgba(255,255,255,0.7); border: 1px solid rgba(30,41,59,0.08); border-radius: 14px; padding: 1.5rem; transition: all 0.3s; box-shadow: 0 6px 16px -8px rgba(30,41,59,0.12); }
        .tech-box:hover { border-color: #4f46e5; box-shadow: 0 12px 24px -10px rgba(79,70,229,0.25); transform: translateY(-3px); }
        .edit-toggle { position: fixed; bottom: 1rem; left: 1rem; z-index: 60; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.85); border: 1px solid rgba(30,41,59,0.2); color: rgba(30,41,59,0.6); font-size: 0.85rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(30,41,59,0.1); }
        .edit-toggle:hover { color: #4f46e5; border-color: #4f46e5; }
        body.edit-mode .edit-toggle { color: #059669; border-color: #059669; box-shadow: 0 0 12px rgba(5,150,105,0.3); }
        .export-pdf { position: fixed; bottom: 1rem; left: 3.6rem; z-index: 60; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.85); border: 1px solid rgba(30,41,59,0.2); color: rgba(30,41,59,0.6); font-size: 0.85rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(30,41,59,0.1); }
        .export-pdf:hover { color: #7c3aed; border-color: #7c3aed; }
        .edit-toolbar { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 61; display: none; align-items: center; gap: 0.4rem; padding: 0.45rem 0.6rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border: 1px solid rgba(5,150,105,0.4); border-radius: 9999px; box-shadow: 0 8px 24px rgba(30,41,59,0.15); max-width: 92vw; flex-wrap: wrap; justify-content: center; }
        body.edit-mode .edit-toolbar { display: flex; }
        .edit-toolbar button { font-family: 'Rubik', sans-serif; font-size: 0.8rem; font-weight: 600; color: #1e293b; background: rgba(30,41,59,0.05); border: 1px solid rgba(30,41,59,0.12); border-radius: 9999px; padding: 0.35rem 0.7rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .edit-toolbar button:hover { border-color: #4f46e5; color: #4f46e5; }
        .edit-toolbar button[data-act="glow-emerald"]:hover { border-color: #059669; color: #059669; }
        .slide-controls { position: absolute; top: 1rem; right: 1rem; z-index: 40; display: none; gap: 0.4rem; }
        body.edit-mode .slide-controls { display: flex; }
        .slide-ctrl { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; background: rgba(255,255,255,0.9); border: 1px solid rgba(30,41,59,0.2); color: #475569; box-shadow: 0 2px 8px rgba(30,41,59,0.1); }
        .slide-ctrl:hover { color: #4f46e5; border-color: #4f46e5; }
        .slide-ctrl.del { background: rgba(254,226,226,0.9); border-color: rgba(239,68,68,0.5); color: #dc2626; }
        .slide-ctrl.del:hover { background: rgba(254,202,202,1); }
        body.edit-mode .cyber-panel { outline: 1px dashed rgba(5,150,105,0.4); outline-offset: 6px; }
        body.edit-mode .reveal-content { opacity: 1 !important; transform: none !important; }
        [contenteditable="true"]:focus { outline: 2px solid #059669; outline-offset: 2px; border-radius: 4px; }
        .term { border-bottom: 1px dotted #4f46e5; cursor: help; position: relative; font-weight: 600; }
        .term::after { content: attr(data-tip); position: absolute; bottom: 145%; right: 50%; transform: translateX(50%); width: max-content; max-width: 300px; background: rgba(255,255,255,0.98); border: 1px solid #4f46e5; color: #1e293b; font-size: 0.8rem; font-weight: 400; line-height: 1.55; text-align: right; padding: 0.7rem 0.9rem; border-radius: 10px; white-space: normal; opacity: 0; visibility: hidden; transition: opacity 0.2s ease; z-index: 80; box-shadow: 0 10px 30px rgba(30,41,59,0.2); pointer-events: none; }
        .term:hover::after, .term.show-tip::after { opacity: 1; visibility: visible; }
        .print-glossary { display: none; }
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { overflow: visible !important; background: #ffffff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .orb, .scroll-nav, .edit-toggle, .export-pdf, .edit-toolbar, .slide-controls { display: none !important; }
            .scroll-container { height: auto !important; overflow: visible !important; scroll-snap-type: none !important; }
            .slide { height: auto !important; min-height: 100vh; page-break-after: always; break-after: page; overflow: visible !important; }
            .slide:last-child { page-break-after: auto; break-after: auto; }
            .reveal-content { opacity: 1 !important; transform: none !important; }
        }

    </style>
</head>
<body>

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Fixed Side Navigation -->
    <div class="scroll-nav" id="scrollNav">
        <div class="nav-dot active" data-index="0" data-label="התחלה"></div>
        <div class="nav-dot" data-index="1" data-label="חלק א': הקמה"></div>
        <div class="nav-dot" data-index="2" data-label="חלק א': סכנות"></div>
        <div class="nav-dot" data-index="3" data-label="חלק ב': פרודקשן"></div>
        <div class="nav-dot" data-index="4" data-label="חלק ב': עסקי"></div>
        <div class="nav-dot" data-index="5" data-label="חלק ג': נחיתה רכה"></div>
        <div class="nav-dot" data-index="6" data-label="חלק ג': ולידציה"></div>
        <div class="nav-dot" data-index="7" data-label="דברו עם הבוט"></div>
    </div>

    <!-- Main Scrolling Container -->
    <div class="scroll-container" id="mainContainer">
        <section class="slide" id="slide-0">
            <div class="cyber-panel text-center">
                <h1 class="reveal-content delay-1 text-6xl md:text-7xl font-black mb-6 glow-text-cyan">כותרת המצגת</h1>
                <p class="reveal-content delay-2 text-xl text-slate-400 max-w-2xl mx-auto">לחצו על ⋯ (מצב עריכה) כדי להתחיל — הוסיפו שקפים, אזורים, זוהר וטקסט. השמירה אוטומטית לענן.</p>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[100] flex items-center gap-3"><i class="fa-solid fa-circle-check text-emerald-400"></i> הפרומפט הועתק בהצלחה!</div>
    <script>
        // --- העתקה ללוח (לבלוקי הפרומפט) ---
        function copyToClipboard(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            navigator.clipboard.writeText(el.innerText).then(() => {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.classList.remove('opacity-0');
                setTimeout(() => { toast.classList.add('opacity-0'); }, 2500);
            });
        }

        // --- גרף ידע אינטראקטיבי (vis-network) ---
        function initKnowledgeGraph() {
            const container = document.getElementById('interactive-graph');
            if (!container || typeof vis === 'undefined') return;
            if (container.dataset.inited === '1') return;
            container.dataset.inited = '1';

            const nodes = new vis.DataSet([
                { id: 1, label: "עונת חורף", value: 35 },
                { id: 2, label: "קולקציית חורף", value: 25 },
                { id: 3, label: "סייל חורף 30%", value: 25 },
                { id: 4, label: "ג'קטים", value: 20 },
                { id: 5, label: "סוודרים", value: 20 },
                { id: 6, label: "ג'קט ג'ינס", value: 15 },
                { id: 7, label: "מעיל צמר", value: 15 },
                { id: 8, label: "סוודר גולף", value: 15 },
                { id: 9, label: "ירון (לקוח)", value: 18 },
                { id: 10, label: "הזמנה 1050", value: 12 },
                { id: 11, label: "צבע שחור", value: 10 },
                { id: 12, label: "מידה L", value: 10 },
                { id: 13, label: "אביזרים", value: 15 },
                { id: 14, label: "כובע גרב", value: 10 },
                { id: 15, label: "שרה (לקוחה)", value: 18 },
                { id: 16, label: "מידה M", value: 10 }
            ]);
            const edges = new vis.DataSet([
                { from: 2, to: 1, label: "מתאים ל" },
                { from: 4, to: 2, label: "תת-קטגוריה" },
                { from: 5, to: 2, label: "תת-קטגוריה" },
                { from: 13, to: 2, label: "תת-קטגוריה" },
                { from: 6, to: 4, label: "שייך ל" },
                { from: 7, to: 4, label: "שייך ל" },
                { from: 8, to: 5, label: "שייך ל" },
                { from: 14, to: 13, label: "שייך ל" },
                { from: 2, to: 3, label: "משתתף ב" },
                { from: 6, to: 11, label: "זמין ב" },
                { from: 7, to: 11, label: "זמין ב" },
                { from: 6, to: 12, label: "זמין ב" },
                { from: 8, to: 16, label: "זמין ב" },
                { from: 9, to: 10, label: "ביצע" },
                { from: 10, to: 6, label: "כוללת" },
                { from: 15, to: 7, label: "צפתה ב" },
                { from: 15, to: 14, label: "רכשה" }
            ]);
            const data = { nodes: nodes, edges: edges };
            const options = {
                nodes: {
                    shape: 'dot',
                    color: { background: '#3b82f6', border: '#2563eb', highlight: { background: '#60a5fa', border: '#1d4ed8' }, hover: { background: '#60a5fa', border: '#1d4ed8' } },
                    font: { face: 'Rubik, sans-serif', size: 14, color: '#0f172a', strokeWidth: 3, strokeColor: '#ffffff' }
                },
                edges: {
                    color: { color: '#cbd5e1', highlight: '#94a3b8', hover: '#94a3b8' },
                    smooth: false,
                    arrows: { to: { enabled: true, scaleFactor: 0.4 } },
                    font: { face: 'Rubik, sans-serif', size: 11, align: 'top', color: '#64748b', strokeWidth: 0 }
                },
                physics: {
                    forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.005, springLength: 200, springConstant: 0.05 },
                    maxVelocity: 50, solver: 'forceAtlas2Based', timestep: 0.35, stabilization: { iterations: 150 }
                },
                interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragView: true }
            };
            const network = new vis.Network(container, data, options);

            const wrapper = document.getElementById('graph-wrapper');
            const msg = document.getElementById('ctrl-zoom-msg');
            let msgTimeout;
            if (wrapper) {
                wrapper.addEventListener('wheel', function (event) {
                    if (!event.ctrlKey && !event.metaKey) {
                        event.stopPropagation();
                        if (msg) {
                            msg.classList.remove('opacity-0');
                            clearTimeout(msgTimeout);
                            msgTimeout = setTimeout(() => { msg.classList.add('opacity-0'); }, 1500);
                        }
                    } else {
                        event.preventDefault();
                    }
                }, { capture: true, passive: false });
            }
        }

        // מופעל ע"י ה-shell אחרי שהתוכן נטען מ-KV
        function renderRichContent() {
            try { if (window.lucide) lucide.createIcons(); } catch (e) {}
            try { initKnowledgeGraph(); } catch (e) {}
        }

    </script>
    <!-- Edit Mode Toggle (fixed bottom) -->
    <button class="edit-toggle" id="editToggle" title="מצב עריכה"><i class="fa-solid fa-ellipsis"></i></button>
    <button class="export-pdf" id="exportPdf" title="ייצוא ל-PDF"><i class="fa-solid fa-file-pdf"></i></button>
    <div class="edit-toolbar" id="editToolbar">
        <button data-act="add-slide"><i class="fa-solid fa-plus"></i> שקופית</button>
        <button data-act="add-block"><i class="fa-solid fa-plus"></i> אזור</button>
        <button data-act="glow-cyan">🎨 צבע כחול</button>
        <button data-act="glow-emerald">🎨 צבע ירוק</button>
        <button data-act="unglow">⊘ הסר צבע</button>
        <button data-act="download" style="border-color: rgba(0,255,157,0.5); color: var(--neon-emerald);"><i class="fa-solid fa-download"></i> שמור קובץ</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const mainContainer = document.getElementById('mainContainer');
            const scrollNav = document.getElementById('scrollNav');
            const editToggle = document.getElementById('editToggle');
            const editToolbar = document.getElementById('editToolbar');
            const STORAGE_KEY = 'presentation_state_v2';

            let currentIndex = 0;
            let isScrolling = false;
            let editMode = false;
            let observer = null;

            const getSlides = () => Array.from(document.querySelectorAll('.slide'));

            // ===== Glossary: explain technical terms on hover/tap =====
            // (longer / more specific terms first so they win over generic ones)
            const GLOSSARY = [
                { key: 'cloudapi', term: 'Cloud API', tip: 'ה-API הרשמי של וואטסאפ (Meta) לשליחה וקבלה של הודעות באופן חוקי ויציב.' },
                { key: 'whatsappwebjs', term: 'whatsapp-web.js', tip: 'ספריית קוד לא-רשמית שמתחברת לוואטסאפ ווב על ידי הפעלת דפדפן נסתר (Puppeteer).' },
                { key: 'multitenancy', term: 'Multi-tenancy', tip: 'ארכיטקטורה שבה מערכת אחת משרתת כמה לקוחות בנפרד, עם הפרדה מלאה ביניהם.' },
                { key: 'humanloop', term: 'Human In Loop', tip: '"אדם בלולאה" — אדם שמפקח על התהליך האוטומטי ויכול להתערב בכל רגע.' },
                { key: 'vectordb', term: 'Vector DB', tip: 'מסד נתונים וקטורי — שומר embeddings ומאפשר למצוא במהירות את הקטעים הדומים ביותר לשאלה.' },
                { key: 'mvp', term: 'MVP', tip: 'Minimum Viable Product — גרסה ראשונית ומינימלית שמוכיחה שהרעיון עובד, לפני פיתוח מלא.' },
                { key: 'nodejs', term: 'Node.js', tip: 'סביבת הרצה להרצת קוד JavaScript מחוץ לדפדפן — על השרת/מחשב.' },
                { key: 'tunnel', term: 'מנהרה', tip: 'Tunnel — כלי שחושף שרת מקומי שרץ על המחשב שלך אל האינטרנט, כדי ששירות חיצוני יגיע אליו (כמו Ngrok / Cloudflare Tunnel). במקרה שלנו לא צריך אותו.' },
                { key: 'ban', term: 'Ban', tip: 'חסימה — וואטסאפ חוסמת את המספר מלהשתמש בשירות.' },
                { key: 'embedding', term: 'embedding', tip: 'ייצוג מספרי (וקטור) של טקסט שמקודד את המשמעות שלו — מאפשר להשוות דמיון בין טקסטים.' },
                { key: 'production', term: 'פרודקשן', tip: 'סביבת הייצור — המערכת "האמיתית" שמשרתת לקוחות, להבדיל מסביבת פיתוח/בדיקות.' },
                { key: 'twilio', term: 'Twilio', tip: 'חברה שמספקת גישה נוחה ל-APIs של תקשורת (כולל וואטסאפ הרשמי) דרך שירות מנוהל אחד.' },
                { key: 'webhooks', term: 'webhooks', tip: 'מנגנון שבו שירות חיצוני "דוחף" אליך קריאת HTTP ברגע שמשהו קורה (למשל כשמתקבלת הודעה).' },
                { key: 'serverless', term: 'serverless', tip: 'הרצת קוד בלי לנהל שרת — הספק מריץ את הקוד רק כשצריך ומחייב לפי שימוש בפועל.' },
                { key: 'database', term: 'Database', tip: 'מסד נתונים — מערכת לשמירה מסודרת של מידע (כאן: היסטוריית השיחות והזיכרון).' },
                { key: 'fallback', term: 'Fallback', tip: 'מנגנון גיבוי — מה קורה כשהבוט נתקע: העברה אוטומטית לנציג אנושי.' },
                { key: 'optin', term: 'Opt-in', tip: 'הסכמה מפורשת ומראש של הלקוח לקבל הודעות אוטומטיות.' },
                { key: 'sla', term: 'SLA', tip: 'Service Level Agreement — הסכם שמגדיר רמת שירות, זמינות ואחריות.' },
                { key: 'retainer', term: 'Retainer', tip: 'תשלום חודשי קבוע עבור שירות מתמשך (תחזוקה, שרתים, תמיכה).' },
                { key: 'hallucination', term: 'הלוצינציות', tip: 'Hallucinations — מצב שבו ה-AI ממציא מידע שגוי ומציג אותו בביטחון.' },
                { key: 'muted', term: 'Muted', tip: 'מושתק — הבוט מפסיק לענות אוטומטית כשנציג אנושי נכנס לשיחה.' },
                { key: 'vm', term: 'VM', tip: 'Virtual Machine — מחשב וירטואלי בענן שרץ תמיד, כמו מחשב מרוחק שתמיד דלוק.' },
                { key: 'qa', term: 'QA', tip: 'Quality Assurance — בדיקות איכות שמוודאות שהמערכת עובדת נכון לפני עלייה לאוויר.' },
                { key: 'api', term: 'API', tip: 'Application Programming Interface — "שקע" תקשורת שדרכו תוכנה מבקשת שירות מתוכנה אחרת.' }
            ];

            const wrapTerm = (root, term, tip, key) => {
                if (root.querySelector('.term[data-term="' + key + '"]')) return; // already wrapped in this slide
                const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                    acceptNode(node) {
                        if (!node.nodeValue || node.nodeValue.indexOf(term) === -1) return NodeFilter.FILTER_REJECT;
                        let p = node.parentElement;
                        while (p && p !== root) {
                            const tag = p.tagName ? p.tagName.toLowerCase() : '';
                            if (tag === 'code' || tag === 'pre' || tag === 'svg' || tag === 'button' ||
                                (p.classList && (p.classList.contains('term') || p.classList.contains('font-mono') || p.classList.contains('slide-controls') || p.classList.contains('print-glossary')))) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            p = p.parentElement;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                });
                const node = walker.nextNode();
                if (!node) return;
                const idx = node.nodeValue.indexOf(term);
                const after = node.splitText(idx);
                after.nodeValue = after.nodeValue.slice(term.length);
                const span = document.createElement('span');
                span.className = 'term';
                span.setAttribute('data-term', key);
                span.setAttribute('data-tip', tip);
                span.textContent = term;
                node.parentNode.insertBefore(span, after);
            };

            const applyGlossary = () => {
                getSlides().forEach(slide => {
                    GLOSSARY.forEach(g => wrapTerm(slide, g.term, g.tip, g.key));
                });
            };

            let editPassword = null;
            try { editPassword = sessionStorage.getItem('deck_pw'); } catch (e) {}

            // API endpoint scoped to the current deck path (e.g. /whatsapp-bot/api/content)
            const API_CONTENT = (() => {
                const p = location.pathname.replace(/\/(index|presentation)\.html$/i, '').replace(/\/+$/, '');
                return (p || '') + '/api/content';
            })();

            // Build clean deck HTML (strip runtime-only artefacts)
            const cleanDeckHtml = () => {
                const clone = mainContainer.cloneNode(true);
                clone.querySelectorAll('.cyber-panel').forEach(p => p.removeAttribute('contenteditable'));
                clone.querySelectorAll('.slide').forEach(s => s.classList.remove('in-view'));
                clone.querySelectorAll('.slide-controls, .print-glossary').forEach(b => b.remove());
                clone.querySelectorAll('.term').forEach(s => s.replaceWith(document.createTextNode(s.textContent)));
                return clone.innerHTML;
            };

            const saveState = () => {
                try { localStorage.setItem(STORAGE_KEY, cleanDeckHtml()); } catch (err) {}
            };

            // Load content: server (Cloudflare KV) first, then localStorage fallback
            const loadContent = async () => {
                try {
                    const res = await fetch(API_CONTENT, { cache: 'no-store' });
                    if (res.ok) {
                        const txt = await res.text();
                        if (txt && txt.trim().length > 20) { mainContainer.innerHTML = txt; return; }
                    }
                } catch (e) { /* no server (GitHub Pages / local file) — fall back */ }
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) mainContainer.innerHTML = saved;
                } catch (e) {}
            };

            // Persist to server (KV) once when finishing an edit. Silent no-op if no server.
            const saveToServer = async () => {
                if (!editPassword) {
                    editPassword = (typeof prompt === 'function' ? prompt('סיסמת עריכה (לשמירה בענן):') : '') || '';
                    try { if (editPassword) sessionStorage.setItem('deck_pw', editPassword); } catch (e) {}
                }
                if (!editPassword) return;
                try {
                    const res = await fetch(API_CONTENT, {
                        method: 'POST',
                        headers: { 'content-type': 'text/plain; charset=utf-8', 'x-edit-password': editPassword, 'x-template': (document.documentElement.dataset.template || 'dark') },
                        body: cleanDeckHtml()
                    });
                    if (res.status === 401) {
                        try { sessionStorage.removeItem('deck_pw'); } catch (e) {}
                        editPassword = null;
                        alert('סיסמת עריכה שגויה — השינוי נשמר מקומית בלבד.');
                    }
                } catch (e) { /* no server endpoint — saved locally only */ }
            };

            const labelFor = (slide, i) => {
                const h = slide.querySelector('h1, h2');
                const t = (h ? h.textContent : '').trim();
                return t ? (t.length > 45 ? t.slice(0, 45) + '…' : t) : ('שקופית ' + (i + 1));
            };

            const goTo = (i) => {
                const slides = getSlides();
                i = Math.max(0, Math.min(slides.length - 1, i));
                if (slides[i]) slides[i].scrollIntoView({ behavior: 'smooth' });
            };

            const setActiveDot = (i) => {
                scrollNav.querySelectorAll('.nav-item').forEach((d, di) => d.classList.toggle('active', di === i));
                const active = scrollNav.querySelector('.nav-item.active');
                if (active) scrollNav.scrollTo({ left: active.offsetLeft - scrollNav.clientWidth / 2 + active.clientWidth / 2, behavior: 'smooth' });
            };

            const buildNav = () => {
                scrollNav.innerHTML = '';
                getSlides().forEach((slide, i) => {
                    const item = document.createElement('div');
                    item.className = 'nav-item nav-link' + (i === currentIndex ? ' active' : '');
                    item.setAttribute('data-index', i);
                    item.textContent = labelFor(slide, i);
                    item.addEventListener('click', () => goTo(i));
                    scrollNav.appendChild(item);
                });
            };

            const moveSlide = (slide, dir) => {
                const slides = getSlides();
                const i = slides.indexOf(slide);
                const j = i + dir;
                if (j < 0 || j >= slides.length) return;
                if (dir < 0) slide.parentNode.insertBefore(slide, slides[j]);
                else slide.parentNode.insertBefore(slides[j], slide);
                refresh();
                saveState();
                setTimeout(() => slide.scrollIntoView({ behavior: 'smooth' }), 50);
            };

            const ensureSlideControls = (slide) => {
                if (slide.querySelector('.slide-controls')) return;
                const bar = document.createElement('div');
                bar.className = 'slide-controls';
                const mk = (icon, title, cls, fn) => {
                    const b = document.createElement('button');
                    b.className = 'slide-ctrl' + (cls ? ' ' + cls : '');
                    b.title = title;
                    b.innerHTML = '<i class="fa-solid ' + icon + '"></i>';
                    b.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
                    return b;
                };
                bar.appendChild(mk('fa-chevron-up', 'הזז למעלה', '', () => moveSlide(slide, -1)));
                bar.appendChild(mk('fa-chevron-down', 'הזז למטה', '', () => moveSlide(slide, 1)));
                bar.appendChild(mk('fa-xmark', 'מחק שקופית', 'del', () => {
                    if (getSlides().length <= 1) return;
                    if (!confirm('למחוק את השקופית הזו?')) return;
                    slide.remove();
                    refresh();
                    saveState();
                }));
                slide.appendChild(bar);
            };

            const setEditable = (on) => {
                getSlides().forEach(s => {
                    const panel = s.querySelector('.cyber-panel');
                    if (panel) panel.setAttribute('contenteditable', on ? 'true' : 'false');
                });
            };

            const refresh = () => {
                const slides = getSlides();
                if (observer) observer.disconnect();
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('in-view');
                            currentIndex = getSlides().indexOf(entry.target);
                            setActiveDot(currentIndex);
                        }
                    });
                }, { root: mainContainer, rootMargin: '0px', threshold: 0.5 });
                slides.forEach(s => { observer.observe(s); ensureSlideControls(s); });
                buildNav();
                setEditable(editMode);
                applyGlossary();
            };

            const addSlide = () => {
                const slides = getSlides();
                const section = document.createElement('section');
                section.className = 'slide';
                const darkT = (document.documentElement.dataset.template || 'dark') === 'dark';
                section.innerHTML =
                    '<div class="cyber-panel"' + (editMode ? ' contenteditable="true"' : '') + '>' +
                    '<h2 class="text-4xl md:text-5xl font-bold mb-6 glow-text-cyan">כותרת חדשה</h2>' +
                    '<p class="text-lg leading-relaxed ' + (darkT ? 'text-slate-300' : 'text-slate-600') + '">טקסט רגיל — לחצו כאן כדי לערוך.</p>' +
                    '</div>';
                // Insert before the last slide so the closing (QR) slide stays last
                const last = slides[slides.length - 1];
                if (last) last.parentNode.insertBefore(section, last);
                else mainContainer.appendChild(section);
                refresh();
                setTimeout(() => section.scrollIntoView({ behavior: 'smooth' }), 50);
            };

            // Add a content "area" (editable block) to the current slide
            const addBlock = () => {
                const slide = getSlides()[currentIndex];
                if (!slide) return;
                const panel = slide.querySelector('.cyber-panel');
                if (!panel) return;
                const block = document.createElement('div');
                const dark = (document.documentElement.dataset.template || 'dark') === 'dark';
                block.className = 'tech-box mt-4';
                block.innerHTML =
                    '<h3 class="text-xl font-bold mb-2 ' + (dark ? 'text-white' : 'text-slate-800') + '">כותרת אזור</h3>' +
                    '<p class="text-sm ' + (dark ? 'text-slate-300' : 'text-slate-600') + '">טקסט — לחצו כאן כדי לערוך.</p>';
                panel.appendChild(block);
                saveState();
            };

            // Wrap the current text selection in a glow span
            const applyGlow = (cls) => {
                const sel = window.getSelection();
                if (!sel || !sel.rangeCount || sel.isCollapsed) return;
                const range = sel.getRangeAt(0);
                const span = document.createElement('span');
                span.className = cls;
                try {
                    range.surroundContents(span);
                } catch (e) {
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                }
                sel.removeAllRanges();
                saveState();
            };

            // Remove the nearest glow wrapper around the selection
            const removeGlow = () => {
                const sel = window.getSelection();
                if (!sel || !sel.rangeCount) return;
                let node = sel.anchorNode;
                while (node && node !== document.body) {
                    if (node.nodeType === 1 && node.classList &&
                        (node.classList.contains('glow-text-cyan') || node.classList.contains('glow-text-emerald'))) {
                        const parent = node.parentNode;
                        while (node.firstChild) parent.insertBefore(node.firstChild, node);
                        parent.removeChild(node);
                        saveState();
                        return;
                    }
                    node = node.parentNode;
                }
            };

            // Download the current presentation (with all your edits baked in) as a standalone HTML file
            const downloadHtml = () => {
                const docClone = document.documentElement.cloneNode(true);
                // strip runtime-only artefacts so the file is a clean, authoritative source
                docClone.querySelectorAll('.cyber-panel').forEach(p => p.removeAttribute('contenteditable'));
                docClone.querySelectorAll('.slide').forEach(s => s.classList.remove('in-view'));
                docClone.querySelectorAll('.slide-controls, .print-glossary').forEach(b => b.remove());
                docClone.querySelectorAll('.term').forEach(t => t.replaceWith(document.createTextNode(t.textContent)));
                const navClone = docClone.querySelector('#scrollNav');
                if (navClone) navClone.innerHTML = '';
                const html = '<!DOCTYPE html>\n' + docClone.outerHTML;
                const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'presentation.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };

            // ---- Init ----
            await loadContent();
            refresh();
            renderRichContent();

            editToggle.addEventListener('click', () => {
                editMode = !editMode;
                document.body.classList.toggle('edit-mode', editMode);
                setEditable(editMode);
                if (editMode) {
                    editToggle.innerHTML = '<i class="fa-solid fa-check"></i>';
                    editToggle.title = 'שמור וסיים';
                } else {
                    saveState();
                    saveToServer();
                    buildNav(); // refresh labels in case headings changed
                    editToggle.innerHTML = '<i class="fa-solid fa-ellipsis"></i>';
                    editToggle.title = 'מצב עריכה';
                }
            });

            // Keep text selection alive when clicking toolbar buttons (don't steal focus)
            editToolbar.addEventListener('mousedown', (e) => { e.preventDefault(); });
            editToolbar.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const act = btn.getAttribute('data-act');
                if (act === 'add-slide') addSlide();
                else if (act === 'add-block') addBlock();
                else if (act === 'glow-cyan') applyGlow('glow-text-cyan');
                else if (act === 'glow-emerald') applyGlow('glow-text-emerald');
                else if (act === 'unglow') removeGlow();
                else if (act === 'download') downloadHtml();
            });

            // Tap/click a term to toggle its tooltip (for touch + live presenting). Hover works too.
            document.addEventListener('click', (e) => {
                const t = e.target.closest ? e.target.closest('.term') : null;
                document.querySelectorAll('.term.show-tip').forEach(el => { if (el !== t) el.classList.remove('show-tip'); });
                if (t && !editMode) t.classList.toggle('show-tip');
            });

            // Build a per-slide glossary box (shown only in print) from the slide's terms
            const buildPrintGlossaries = () => {
                getSlides().forEach(slide => {
                    const old = slide.querySelector('.print-glossary');
                    if (old) old.remove();
                    const terms = Array.from(slide.querySelectorAll('.term'));
                    if (!terms.length) return;
                    const seen = new Set();
                    const items = [];
                    terms.forEach(t => {
                        const key = t.getAttribute('data-term');
                        if (seen.has(key)) return;
                        seen.add(key);
                        items.push('<li><strong>' + t.textContent + '</strong> — ' + (t.getAttribute('data-tip') || '') + '</li>');
                    });
                    if (!items.length) return;
                    const box = document.createElement('div');
                    box.className = 'print-glossary';
                    box.innerHTML = '<h4>מילון מונחים בשקופית זו</h4><ul>' + items.join('') + '</ul>';
                    (slide.querySelector('.cyber-panel') || slide).appendChild(box);
                });
            };

            // Export to PDF (via browser print). Exits edit mode first for a clean output.
            const exportBtn = document.getElementById('exportPdf');
            exportBtn.addEventListener('click', () => {
                if (editMode) {
                    editMode = false;
                    document.body.classList.remove('edit-mode');
                    setEditable(false);
                    saveState();
                    buildNav();
                    editToggle.innerHTML = '<i class="fa-solid fa-ellipsis"></i>';
                    editToggle.title = 'מצב עריכה';
                }
                buildPrintGlossaries();
                setTimeout(() => window.print(), 150);
            });

            // Wheel: one slide per gesture (prevents jumpy snapping)
            mainContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (isScrolling || Math.abs(e.deltaY) < 8) return;
                isScrolling = true;
                goTo(currentIndex + (e.deltaY > 0 ? 1 : -1));
                setTimeout(() => { isScrolling = false; }, 850);
            }, { passive: false });

            // Keyboard navigation (disabled while editing so you can type freely)
            window.addEventListener('keydown', (e) => {
                if (editMode) return;
                if (['ArrowDown', 'PageDown', ' '].includes(e.key)) {
                    e.preventDefault(); goTo(currentIndex + 1);
                } else if (['ArrowUp', 'PageUp'].includes(e.key)) {
                    e.preventDefault(); goTo(currentIndex - 1);
                } else if (e.key === 'Home') {
                    e.preventDefault(); goTo(0);
                } else if (e.key === 'End') {
                    e.preventDefault(); goTo(getSlides().length - 1);
                }
            });
        });
    </script>
</body>
</html>
