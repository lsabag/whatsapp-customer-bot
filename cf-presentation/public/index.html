<!DOCTYPE html>
<html lang="he" dir="rtl" data-template="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצגת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-emerald: #00ff9d;
            --dark-bg: #030712;
            --glass-bg: rgba(10, 15, 30, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Varela Round', 'Heebo', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            overflow: hidden; /* We handle scrolling in the container */
        }

        /* Hide standard scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* The Scroll Snapping Container */
        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: none;
            position: relative;
            z-index: 10;
        }

        /* Individual Full-Screen Slides */
        .slide {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
            top: -10%; right: -10%;
        }
        .orb-2 {
            width: 35vw; height: 35vw;
            background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%);
            bottom: -10%; left: -10%;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 25vw; height: 25vw;
            background: radial-gradient(circle, var(--neon-emerald) 0%, transparent 70%);
            top: 40%; left: 40%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 30px) scale(1.1); }
            100% { transform: translate(30px, -50px) scale(0.9); }
        }

        /* Glassmorphism Panel */
        .cyber-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
            overflow: visible;
        }

        /* Cyber Accents */
        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            border-top: 3px solid var(--neon-cyan);
            border-right: 3px solid var(--neon-cyan);
            border-top-right-radius: 24px;
        }
        .cyber-panel::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 40px; height: 40px;
            border-bottom: 3px solid var(--neon-purple);
            border-left: 3px solid var(--neon-purple);
            border-bottom-left-radius: 24px;
        }

        /* Text Glows */
        .glow-text-cyan {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0, 243, 255, 0.5);
        }
        .glow-text-emerald {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-emerald), 0 0 20px rgba(0, 255, 157, 0.5);
        }
        .glow-text {
            text-shadow: 0 0 8px var(--glow-color, #00f3ff), 0 0 18px var(--glow-color, #00f3ff);
        }

        /* Scroll Indicators (Right Side) */
        .scroll-nav {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.5rem;
            z-index: 50;
            padding: 0.75rem 1.5rem;
            background: rgba(10, 15, 30, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .nav-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }
        .nav-dot.active {
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(1.5);
        }
        .nav-dot::after {
            content: attr(data-label);
            position: absolute;
            top: 22px; /* label below the dot */
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .nav-dot:hover::after, .nav-dot.active::after {
            opacity: 1;
            color: var(--neon-cyan);
        }

        /* Content Reveal Animation */
        .reveal-content {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.2, 1, 0.3, 1), transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .slide.in-view .reveal-content {
            opacity: 1;
            transform: translateY(0);
        }
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }
        .delay-3 { transition-delay: 0.6s; }

        .tech-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .tech-box:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        /* Edit Mode Toggle Button (fixed at bottom, visible on every slide) */
        .edit-toggle {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            z-index: 60;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 1;
            transition: all 0.3s;
        }
        .edit-toggle:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        /* Edit mode active state */
        body.edit-mode .edit-toggle {
            opacity: 1;
            color: var(--neon-emerald);
            border-color: var(--neon-emerald);
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
        }
        body.edit-mode .cyber-panel {
            outline: 1px dashed rgba(0, 255, 157, 0.35);
            outline-offset: 6px;
        }
        body.edit-mode .reveal-content {
            opacity: 1 !important;
            transform: none !important;
        }
        [contenteditable="true"]:focus {
            outline: 2px solid var(--neon-emerald);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Add-slide button (shown only in edit mode, next to the toggle) */
        /* Edit toolbar — shown only in edit mode (add slide/area, glow) */
        .edit-toolbar {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 61;
            display: none;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.6rem;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 9999px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 92vw;
            flex-wrap: wrap;
            justify-content: center;
        }
        body.edit-mode .edit-toolbar { display: flex; }
        .edit-toolbar button {
            font-family: 'Varela Round', 'Heebo', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 9999px;
            padding: 0.35rem 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .edit-toolbar button:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .edit-toolbar button[data-act="glow-emerald"]:hover { border-color: var(--neon-emerald); color: var(--neon-emerald); }

        /* Cancel button (floating, next to the save/confirm toggle — shown only in edit mode) */
        .edit-cancel {
            position: fixed;
            bottom: 1rem;
            left: 3.6rem;
            z-index: 60;
            width: 34px;
            height: 34px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .edit-cancel:hover { color: #fff; background: rgba(239, 68, 68, 0.25); border-color: #f87171; }
        body.edit-mode .edit-cancel { display: flex; }

        /* Export-to-PDF button (always visible, minimal) */
        .export-pdf {
            position: fixed;
            bottom: 1rem;
            left: 3.6rem;
            z-index: 60;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .export-pdf:hover { color: var(--neon-purple); border-color: var(--neon-purple); }
        body.edit-mode .export-pdf { display: none; }

        /* Per-slide controls: move up / down / delete (shown only in edit mode) */
        .slide-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 40;
            display: none;
            gap: 0.4rem;
        }
        body.edit-mode .slide-controls { display: flex; }
        .slide-ctrl {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85);
        }
        .slide-ctrl:hover { color: var(--neon-cyan); border-color: var(--neon-cyan); }
        .slide-ctrl.del { background: rgba(255, 70, 70, 0.15); border-color: rgba(255, 90, 90, 0.5); color: #ff7b7b; }
        .slide-ctrl.del:hover { background: rgba(255, 70, 70, 0.3); }

        /* Glossary terms — dotted underline + hover/tap tooltip */
        .term {
            border-bottom: 1px dotted var(--neon-cyan);
            cursor: help;
            position: relative;
            font-weight: 600;
        }
        .term::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 145%;
            right: 50%;
            transform: translateX(50%);
            width: max-content;
            max-width: 300px;
            background: rgba(3, 7, 18, 0.97);
            border: 1px solid var(--neon-cyan);
            color: #e2e8f0;
            font-size: 0.8rem;
            font-weight: 400;
            line-height: 1.55;
            text-align: right;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            white-space: normal;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            z-index: 80;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }
        .term:hover::after, .term.show-tip::after { opacity: 1; visibility: visible; }

        /* Per-slide glossary box — hidden on screen, shown only in the PDF/print */
        .print-glossary { display: none; }

        /* ===== Print / Export to PDF ===== */
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body {
                overflow: visible !important;
                background: var(--dark-bg) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .orb, .scroll-nav, .edit-toggle, .add-slide, .export-pdf, .slide-controls { display: none !important; }
            .scroll-container { height: auto !important; overflow: visible !important; scroll-snap-type: none !important; }
            .slide {
                height: auto !important;
                min-height: 100vh;
                page-break-after: always;
                break-after: page;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .slide:last-child { page-break-after: auto; break-after: auto; }
            .reveal-content { opacity: 1 !important; transform: none !important; }
            .cyber-panel { outline: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-glossary {
                display: block;
                margin-top: 1.5rem;
                padding-top: 0.8rem;
                border-top: 1px solid rgba(0, 243, 255, 0.35);
                font-size: 0.72rem;
                line-height: 1.5;
                color: #cbd5e1;
                text-align: right;
            }
            .print-glossary h4 { color: var(--neon-cyan); font-weight: 700; margin-bottom: 0.4rem; font-size: 0.8rem; }
            .print-glossary ul { list-style: disc; padding-right: 1.2rem; }
            .print-glossary li { margin-bottom: 0.15rem; }
            .print-glossary strong { color: #fff; }
        }

    </style>
</head>
<body>

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Fixed Side Navigation -->
    <div class="scroll-nav" id="scrollNav">
        <div class="nav-dot active" data-index="0" data-label="התחלה"></div>
        <div class="nav-dot" data-index="1" data-label="חלק א': הקמה"></div>
        <div class="nav-dot" data-index="2" data-label="חלק א': סכנות"></div>
        <div class="nav-dot" data-index="3" data-label="חלק ב': פרודקשן"></div>
        <div class="nav-dot" data-index="4" data-label="חלק ב': עסקי"></div>
        <div class="nav-dot" data-index="5" data-label="חלק ג': נחיתה רכה"></div>
        <div class="nav-dot" data-index="6" data-label="חלק ג': ולידציה"></div>
        <div class="nav-dot" data-index="7" data-label="דברו עם הבוט"></div>
    </div>

    <!-- Main Scrolling Container -->
    <div class="scroll-container" id="mainContainer">
        <section class="slide" id="slide-0">
            <div class="cyber-panel text-center">
                <h1 class="reveal-content delay-1 text-6xl md:text-7xl font-black mb-6 glow-text-cyan">כותרת המצגת</h1>
                <p class="reveal-content delay-2 text-xl text-slate-400 max-w-2xl mx-auto">לחצו על ⋯ (מצב עריכה) כדי להתחיל — הוסיפו שקפים, אזורים, זוהר וטקסט. השמירה אוטומטית לענן.</p>
            </div>
        </section>
    </div>

    <!-- Edit Mode Toggle (fixed bottom) -->
    <button class="edit-toggle" id="editToggle" title="מצב עריכה"><i class="fa-solid fa-ellipsis"></i></button>
    <button class="edit-cancel" id="editCancel" title="בטל שינויים"><i class="fa-solid fa-xmark"></i></button>
    <button class="export-pdf" id="exportPdf" title="ייצוא ל-PDF"><i class="fa-solid fa-file-pdf"></i></button>
    <div class="edit-toolbar" id="editToolbar">
        <button data-act="pwstatus" id="pwStatus" style="border-color: rgba(251,191,36,0.6); color:#fbbf24;"><i class="fa-solid fa-key"></i> הזן קוד לשמירה</button>
        <button data-act="add-slide"><i class="fa-solid fa-plus"></i> שקופית</button>
        <button data-act="add-block"><i class="fa-solid fa-plus"></i> אזור</button>
        <button data-act="theme"><i class="fa-solid fa-circle-half-stroke"></i> החלף עיצוב</button>
        <button data-act="download" style="border-color: rgba(0,255,157,0.5); color: var(--neon-emerald);"><i class="fa-solid fa-download"></i> שמור קובץ</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const mainContainer = document.getElementById('mainContainer');
            const scrollNav = document.getElementById('scrollNav');
            const editToggle = document.getElementById('editToggle');
            const editCancel = document.getElementById('editCancel');
            const editToolbar = document.getElementById('editToolbar');
            const STORAGE_KEY = 'presentation_state_v2';
            const POS_KEY = 'deckpos:' + location.pathname; // מיקום נוכחי בשקפים, לשחזור אחרי רענון

            let currentIndex = 0;
            let isScrolling = false;
            let editMode = false;
            let observer = null;

            const getSlides = () => Array.from(document.querySelectorAll('.slide'));

            // ===== Glossary: explain technical terms on hover/tap =====
            // (longer / more specific terms first so they win over generic ones)
            const GLOSSARY = [
                { key: 'cloudapi', term: 'Cloud API', tip: 'ה-API הרשמי של וואטסאפ (Meta) לשליחה וקבלה של הודעות באופן חוקי ויציב.' },
                { key: 'whatsappwebjs', term: 'whatsapp-web.js', tip: 'ספריית קוד לא-רשמית שמתחברת לוואטסאפ ווב על ידי הפעלת דפדפן נסתר (Puppeteer).' },
                { key: 'multitenancy', term: 'Multi-tenancy', tip: 'ארכיטקטורה שבה מערכת אחת משרתת כמה לקוחות בנפרד, עם הפרדה מלאה ביניהם.' },
                { key: 'humanloop', term: 'Human In Loop', tip: '"אדם בלולאה" — אדם שמפקח על התהליך האוטומטי ויכול להתערב בכל רגע.' },
                { key: 'vectordb', term: 'Vector DB', tip: 'מסד נתונים וקטורי — שומר embeddings ומאפשר למצוא במהירות את הקטעים הדומים ביותר לשאלה.' },
                { key: 'mvp', term: 'MVP', tip: 'Minimum Viable Product — גרסה ראשונית ומינימלית שמוכיחה שהרעיון עובד, לפני פיתוח מלא.' },
                { key: 'nodejs', term: 'Node.js', tip: 'סביבת הרצה להרצת קוד JavaScript מחוץ לדפדפן — על השרת/מחשב.' },
                { key: 'tunnel', term: 'מנהרה', tip: 'Tunnel — כלי שחושף שרת מקומי שרץ על המחשב שלך אל האינטרנט, כדי ששירות חיצוני יגיע אליו (כמו Ngrok / Cloudflare Tunnel). במקרה שלנו לא צריך אותו.' },
                { key: 'ban', term: 'Ban', tip: 'חסימה — וואטסאפ חוסמת את המספר מלהשתמש בשירות.' },
                { key: 'embedding', term: 'embedding', tip: 'ייצוג מספרי (וקטור) של טקסט שמקודד את המשמעות שלו — מאפשר להשוות דמיון בין טקסטים.' },
                { key: 'production', term: 'פרודקשן', tip: 'סביבת הייצור — המערכת "האמיתית" שמשרתת לקוחות, להבדיל מסביבת פיתוח/בדיקות.' },
                { key: 'twilio', term: 'Twilio', tip: 'חברה שמספקת גישה נוחה ל-APIs של תקשורת (כולל וואטסאפ הרשמי) דרך שירות מנוהל אחד.' },
                { key: 'webhooks', term: 'webhooks', tip: 'מנגנון שבו שירות חיצוני "דוחף" אליך קריאת HTTP ברגע שמשהו קורה (למשל כשמתקבלת הודעה).' },
                { key: 'serverless', term: 'serverless', tip: 'הרצת קוד בלי לנהל שרת — הספק מריץ את הקוד רק כשצריך ומחייב לפי שימוש בפועל.' },
                { key: 'database', term: 'Database', tip: 'מסד נתונים — מערכת לשמירה מסודרת של מידע (כאן: היסטוריית השיחות והזיכרון).' },
                { key: 'fallback', term: 'Fallback', tip: 'מנגנון גיבוי — מה קורה כשהבוט נתקע: העברה אוטומטית לנציג אנושי.' },
                { key: 'optin', term: 'Opt-in', tip: 'הסכמה מפורשת ומראש של הלקוח לקבל הודעות אוטומטיות.' },
                { key: 'sla', term: 'SLA', tip: 'Service Level Agreement — הסכם שמגדיר רמת שירות, זמינות ואחריות.' },
                { key: 'retainer', term: 'Retainer', tip: 'תשלום חודשי קבוע עבור שירות מתמשך (תחזוקה, שרתים, תמיכה).' },
                { key: 'hallucination', term: 'הלוצינציות', tip: 'Hallucinations — מצב שבו ה-AI ממציא מידע שגוי ומציג אותו בביטחון.' },
                { key: 'muted', term: 'Muted', tip: 'מושתק — הבוט מפסיק לענות אוטומטית כשנציג אנושי נכנס לשיחה.' },
                { key: 'vm', term: 'VM', tip: 'Virtual Machine — מחשב וירטואלי בענן שרץ תמיד, כמו מחשב מרוחק שתמיד דלוק.' },
                { key: 'qa', term: 'QA', tip: 'Quality Assurance — בדיקות איכות שמוודאות שהמערכת עובדת נכון לפני עלייה לאוויר.' },
                { key: 'api', term: 'API', tip: 'Application Programming Interface — "שקע" תקשורת שדרכו תוכנה מבקשת שירות מתוכנה אחרת.' },
                { key: 'rag', term: 'RAG', tip: 'Retrieval-Augmented Generation — שליפת קטעי המידע הרלוונטיים לכל שאלה והזרקתם ל-AI בזמן אמת.' },
                { key: 'kgraph', term: 'Knowledge Graph', tip: 'גרף ידע — ייצוג המידע כרשת של פריטים והקשרים ביניהם, לשליפת תשובות מדויקות על קשרים.' },
                { key: 'chroma', term: 'Chroma', tip: 'מסד וקטורי חינמי וקוד-פתוח — מאחסן מידע ומאפשר חיפוש לפי משמעות (ל-RAG).' },
                { key: 'pinecone', term: 'Pinecone', tip: 'שירות ענן לאחסון וחיפוש לפי משמעות (ל-RAG).' },
                { key: 'neo4j', term: 'Neo4j', tip: 'מסד נתונים מסוג גרף — שומר מידע כרשת של פריטים והקשרים ביניהם (ל-Knowledge Graph).' },
                { key: 'bsp', term: 'BSP', tip: 'Business Solution Provider — חברה מורשית של Meta שנותנת גישה ל-WhatsApp Business API ומטפלת בתשתית, אישורי מספר, תבניות וחיוב (כמו Twilio).' },
                { key: 'oraclecloud', term: 'Oracle Cloud', tip: 'שירות ענן של Oracle להשכרת שרתים וירטואליים (יש גם שכבה חינמית תמידית) — אפשר להריץ עליו את הבוט 24/7.' },
                { key: 'aws', term: 'AWS', tip: 'Amazon Web Services — ספקית הענן הגדולה בעולם; משכירים בה שרתים ושירותים מנוהלים להרצת אפליקציות 24/7.' },
                { key: 'vps', term: 'VPS', tip: 'Virtual Private Server — שרת וירטואלי פרטי שאתה שוכר (בתשלום חודשי) ומנהל בעצמך, רץ תמיד.' },
                { key: 'cfworkers', term: 'Cloudflare Workers', tip: 'פלטפורמת serverless של Cloudflare — מריצה קוד בענן בלי לנהל שרת, ומשלמים רק לפי שימוש. זול ויעיל לבוט מבוסס Cloud API ו-webhooks.' },
                { key: 'postgres', term: 'Postgres', tip: 'PostgreSQL — מסד נתונים רלציוני פופולרי וקוד-פתוח לשמירת מידע מסודר (כאן: היסטוריית השיחות והזיכרון).' },
                { key: 'supabase', term: 'Supabase', tip: 'פלטפורמה מנוהלת מעל Postgres — מסד נתונים בענן עם API מוכן (תומך גם בחיפוש וקטורי ל-RAG).' }
            ];

            const wrapTerm = (root, term, tip, key) => {
                if (root.querySelector('.term[data-term="' + key + '"]')) return; // already wrapped in this slide
                const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                    acceptNode(node) {
                        if (!node.nodeValue || node.nodeValue.indexOf(term) === -1) return NodeFilter.FILTER_REJECT;
                        let p = node.parentElement;
                        while (p && p !== root) {
                            const tag = p.tagName ? p.tagName.toLowerCase() : '';
                            if (tag === 'code' || tag === 'pre' || tag === 'svg' || tag === 'button' ||
                                (p.classList && (p.classList.contains('term') || p.classList.contains('font-mono') || p.classList.contains('slide-controls') || p.classList.contains('print-glossary')))) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            p = p.parentElement;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                });
                const node = walker.nextNode();
                if (!node) return;
                const idx = node.nodeValue.indexOf(term);
                const after = node.splitText(idx);
                after.nodeValue = after.nodeValue.slice(term.length);
                const span = document.createElement('span');
                span.className = 'term';
                span.setAttribute('data-term', key);
                span.setAttribute('data-tip', tip);
                span.textContent = term;
                node.parentNode.insertBefore(span, after);
            };

            const applyGlossary = () => {
                getSlides().forEach(slide => {
                    GLOSSARY.forEach(g => wrapTerm(slide, g.term, g.tip, g.key));
                });
            };

            let editPassword = null;
            try { editPassword = sessionStorage.getItem('deck_pw'); } catch (e) {}

            // API endpoint scoped to the current deck path (e.g. /whatsapp-bot/api/content)
            const API_CONTENT = (() => {
                const p = location.pathname.replace(/\/(index|presentation)\.html$/i, '').replace(/\/+$/, '');
                return (p || '') + '/api/content';
            })();

            // Build clean deck HTML (strip runtime-only artefacts)
            const cleanDeckHtml = () => {
                const clone = mainContainer.cloneNode(true);
                clone.querySelectorAll('.cyber-panel').forEach(p => p.removeAttribute('contenteditable'));
                clone.querySelectorAll('.slide').forEach(s => s.classList.remove('in-view'));
                clone.querySelectorAll('.slide-controls, .print-glossary').forEach(b => b.remove());
                clone.querySelectorAll('.term').forEach(s => { try { s.replaceWith(document.createTextNode(s.textContent)); } catch (e) {} });
                clone.querySelectorAll('#interactive-graph').forEach(g => { g.innerHTML = ''; }); // אל תשמור את ה-canvas של הגרף
                return clone.innerHTML;
            };

            // גרף ידע אינטראקטיבי (vis-network) — נבנה כשקיים בתוכן אלמנט #interactive-graph
            const renderGraph = () => {
                const container = document.getElementById('interactive-graph');
                if (!container || typeof vis === 'undefined') return;
                container.innerHTML = '';
                const nodes = new vis.DataSet([
                    { id: 1, label: 'תוכנית הליווי', value: 30, color: '#00f3ff' },
                    { id: 2, label: 'משולש העסק המצליח', value: 22, color: '#bc13fe' },
                    { id: 3, label: 'מיומנות עסקית', value: 16 },
                    { id: 4, label: 'ידע מקצועי', value: 16 },
                    { id: 5, label: 'התפתחות אישית', value: 16 },
                    { id: 6, label: 'Claude', value: 12, color: '#00ff9d' },
                    { id: 7, label: 'Make', value: 12, color: '#00ff9d' },
                    { id: 8, label: 'ליווי 1:1', value: 12 },
                    { id: 9, label: 'לייבים שבועיים', value: 12 },
                    { id: 10, label: 'אנשי טק (קהל יעד)', value: 14 },
                    { id: 11, label: 'מנטורים: ניצן/אריה/יניב', value: 14, color: '#bc13fe' }
                ]);
                const edges = new vis.DataSet([
                    { from: 1, to: 2, label: 'מבוססת על' },
                    { from: 2, to: 3 },
                    { from: 2, to: 4 },
                    { from: 2, to: 5 },
                    { from: 4, to: 6, label: 'לומדים' },
                    { from: 4, to: 7, label: 'לומדים' },
                    { from: 1, to: 8, label: 'כוללת' },
                    { from: 1, to: 9, label: 'כוללת' },
                    { from: 1, to: 10, label: 'מיועדת ל' },
                    { from: 11, to: 1, label: 'מלווים' }
                ]);
                const options = {
                    nodes: { shape: 'dot', scaling: { min: 12, max: 28 }, color: { background: '#00f3ff', border: '#0891b2', highlight: { background: '#67e8f9', border: '#06b6d4' } }, font: { face: 'Varela Round, Heebo, sans-serif', size: 17, color: '#f1f5f9', strokeWidth: 5, strokeColor: '#030712' } },
                    edges: { color: { color: 'rgba(148,163,184,0.5)', highlight: '#00f3ff' }, smooth: false, width: 1.5, arrows: { to: { enabled: true, scaleFactor: 0.45 } }, font: { face: 'Varela Round, Heebo, sans-serif', size: 13, align: 'top', color: '#cbd5e1', strokeWidth: 5, strokeColor: '#030712' } },
                    physics: { forceAtlas2Based: { gravitationalConstant: -55, centralGravity: 0.005, springLength: 170, springConstant: 0.05 }, maxVelocity: 50, solver: 'forceAtlas2Based', timestep: 0.35, stabilization: { iterations: 200 } },
                    interaction: { hover: true, zoomView: false, dragView: true }
                };
                try {
                    const network = new vis.Network(container, { nodes, edges }, options);
                    container.style.position = 'relative';
                    const ctrls = document.createElement('div');
                    ctrls.style.cssText = 'position:absolute; top:10px; right:10px; display:flex; flex-direction:column; gap:6px; z-index:5;';
                    const mkBtn = (icon, title, fn) => {
                        const b = document.createElement('button');
                        b.title = title; b.innerHTML = '<i class="fa-solid ' + icon + '"></i>';
                        b.style.cssText = 'width:36px; height:36px; border-radius:8px; background:rgba(10,15,30,0.85); border:1px solid rgba(0,243,255,0.45); color:#00f3ff; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center;';
                        b.addEventListener('mousedown', (e) => { e.preventDefault(); });
                        b.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); fn(); });
                        return b;
                    };
                    ctrls.appendChild(mkBtn('fa-plus', 'התקרב', () => network.moveTo({ scale: network.getScale() * 1.3, animation: { duration: 200 } })));
                    ctrls.appendChild(mkBtn('fa-minus', 'התרחק', () => network.moveTo({ scale: network.getScale() / 1.3, animation: { duration: 200 } })));
                    ctrls.appendChild(mkBtn('fa-expand', 'התאם למסך', () => network.fit({ animation: { duration: 300 } })));
                    container.appendChild(ctrls);
                } catch (e) {}
            };

            const saveState = () => {
                try { localStorage.setItem(STORAGE_KEY, cleanDeckHtml()); } catch (err) {}
            };

            // Load content: server (Cloudflare KV) first, then localStorage fallback
            const loadContent = async () => {
                try {
                    const res = await fetch(API_CONTENT, { cache: 'no-store' });
                    if (res.ok) {
                        const txt = await res.text();
                        if (txt && txt.trim().length > 20) { mainContainer.innerHTML = txt; return; }
                    }
                } catch (e) { /* no server (GitHub Pages / local file) — fall back */ }
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) mainContainer.innerHTML = saved;
                } catch (e) {}
            };

            // Persist to server (KV) once when finishing an edit.
            // Returns: 'ok' | 'no-password' | 'unauthorized' | 'error' | 'no-server'
            const showToast = (msg, ok) => {
                let t = document.getElementById('save-toast');
                if (!t) { t = document.createElement('div'); t.id = 'save-toast'; t.style.cssText = 'position:fixed;bottom:4.2rem;left:50%;transform:translateX(-50%);z-index:200;padding:0.6rem 1.3rem;border-radius:9999px;font-family:inherit;font-weight:700;font-size:0.9rem;box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:opacity .3s;pointer-events:none;'; document.body.appendChild(t); }
                t.style.background = ok === false ? 'rgba(239,68,68,0.95)' : 'rgba(0,255,157,0.95)';
                t.style.color = ok === false ? '#fff' : '#03210f';
                t.textContent = msg; t.style.opacity = '1';
                clearTimeout(t._h); t._h = setTimeout(() => { t.style.opacity = '0'; }, 2500);
            };

            // חיווי בסרגל העריכה: האם הוזן קוד (שמירה תעבוד) או לא
            const updatePwChip = () => {
                const c = document.getElementById('pwStatus');
                if (!c) return;
                if (editPassword) {
                    c.innerHTML = '<i class="fa-solid fa-lock-open"></i> שמירה פעילה';
                    c.style.borderColor = 'rgba(0,255,157,0.6)'; c.style.color = 'var(--neon-emerald)';
                    c.title = 'הקוד הוזן — השמירה תעבוד. לחצו לשינוי או ניקוי הקוד.';
                } else {
                    c.innerHTML = '<i class="fa-solid fa-key"></i> הזן קוד לשמירה';
                    c.style.borderColor = 'rgba(251,191,36,0.6)'; c.style.color = '#fbbf24';
                    c.title = 'כדי לשמור בענן צריך קוד. לחצו כדי להזין אותו.';
                }
            };

            const saveToServer = async () => {
                if (!editPassword) {
                    editPassword = (typeof prompt === 'function' ? prompt('הזינו את קוד העריכה כדי לשמור:') : '') || '';
                    try { if (editPassword) sessionStorage.setItem('deck_pw', editPassword); } catch (e) {}
                }
                if (!editPassword) {
                    alert('⚠️ לא הוזן קוד — השינויים לא נשמרו בענן. הזינו את קוד העריכה כדי לשמור.');
                    return 'no-password';
                }
                let body;
                try {
                    body = cleanDeckHtml();
                } catch (e) {
                    alert('❌ שגיאה בהכנת התוכן לשמירה: ' + (e && e.message ? e.message : e));
                    return 'error';
                }
                try {
                    const res = await fetch(API_CONTENT, {
                        method: 'POST',
                        headers: { 'content-type': 'text/plain; charset=utf-8', 'x-edit-password': editPassword, 'x-template': (document.documentElement.dataset.template || 'dark') },
                        body: body
                    });
                    if (res.status === 401) {
                        try { sessionStorage.removeItem('deck_pw'); } catch (e) {}
                        editPassword = null;
                        alert('❌ קוד העריכה שגוי — השינויים לא נשמרו בענן. נסו שוב.');
                        return 'unauthorized';
                    }
                    if (res.status === 413) {
                        alert('❌ התוכן כבד מדי לשמירה — כנראה תמונה גדולה מדי. נסו תמונה קטנה יותר או הסירו תמונה.');
                        return 'error';
                    }
                    if (!res.ok) {
                        alert('❌ השמירה נכשלה (שגיאת שרת ' + res.status + '). נסו שוב.');
                        return 'error';
                    }
                    return 'ok';
                } catch (e) {
                    alert('❌ אין חיבור לשרת — השינויים לא נשמרו בענן. בדקו את החיבור לאינטרנט ונסו שוב.');
                    return 'error';
                }
            };

            // החלפת עיצוב כהה⇄בהיר — שומר את התוכן ומגיש אותו בתבנית השנייה (אותו תוכן בדיוק)
            const switchTheme = async () => {
                const cur = (document.documentElement.dataset.template === 'light') ? 'light' : 'dark';
                const target = cur === 'light' ? 'dark' : 'light';
                if (!confirm('להחליף את עיצוב המצגת ל' + (target === 'light' ? 'בהיר' : 'כהה') + '? התוכן יישמר ויוצג בעיצוב החדש.')) return;
                if (!editPassword) {
                    editPassword = (typeof prompt === 'function' ? prompt('הזינו את קוד העריכה כדי לשמור ולהחליף עיצוב:') : '') || '';
                    try { if (editPassword) sessionStorage.setItem('deck_pw', editPassword); } catch (e) {}
                }
                if (!editPassword) { alert('⚠️ לא הוזן קוד — העיצוב לא הוחלף.'); return; }
                try {
                    const res = await fetch(API_CONTENT, { method: 'POST', headers: { 'content-type': 'text/plain; charset=utf-8', 'x-edit-password': editPassword, 'x-template': target }, body: cleanDeckHtml() });
                    if (res.status === 401) { try { sessionStorage.removeItem('deck_pw'); } catch (e) {} editPassword = null; alert('❌ קוד העריכה שגוי — העיצוב לא הוחלף.'); return; }
                    if (!res.ok) { alert('❌ החלפת העיצוב נכשלה (שגיאת שרת ' + res.status + ').'); return; }
                    location.href = location.pathname + '?t=' + target;
                } catch (e) { alert('❌ לא ניתן להחליף עיצוב כרגע (אין חיבור לשרת).'); }
            };

            // ביטול שינויים — שחזור הגרסה השמורה האחרונה מהשרת בלי לשמור
            const cancelEdit = async () => {
                if (!confirm('לבטל את השינויים שלא נשמרו ולחזור לגרסה השמורה?')) return;
                let restored = false;
                try {
                    const res = await fetch(API_CONTENT, { cache: 'no-store' });
                    if (res.ok) { const t = await res.text(); if (t && t.trim().length > 20) { mainContainer.innerHTML = t; restored = true; } }
                } catch (e) {}
                if (!restored) {
                    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
                    location.reload();
                    return;
                }
                editMode = false;
                document.body.classList.remove('edit-mode');
                setEditable(false);
                refresh();
                renderGraph();
                if (typeof renderRichContent === 'function') { try { renderRichContent(); } catch (e) {} }
                saveState();
                editToggle.innerHTML = '<i class="fa-solid fa-ellipsis"></i>';
                editToggle.title = 'מצב עריכה';
            };

            const labelFor = (slide, i) => {
                const h = slide.querySelector('h1, h2');
                const t = (h ? h.textContent : '').trim();
                return t ? (t.length > 45 ? t.slice(0, 45) + '…' : t) : ('שקופית ' + (i + 1));
            };

            // גלילה חלקה ומבוקרת (כמו ב-ecommerce-bot): האטה בהתחלה ובסוף, ~1 שניה
            const smoothScrollTo = (targetTop, duration) => {
                const start = mainContainer.scrollTop;
                const dist = targetTop - start;
                if (Math.abs(dist) < 2) return;
                let startTime = null;
                const ease = (t, b, c, d) => { t /= d / 2; if (t < 1) return c / 2 * t * t + b; t--; return -c / 2 * (t * (t - 2) - 1) + b; };
                const step = (now) => {
                    if (startTime === null) startTime = now;
                    const elapsed = now - startTime;
                    if (elapsed < duration) { mainContainer.scrollTop = ease(elapsed, start, dist, duration); requestAnimationFrame(step); }
                    else { mainContainer.scrollTop = targetTop; }
                };
                requestAnimationFrame(step);
            };

            const goTo = (i) => {
                const slides = getSlides();
                i = Math.max(0, Math.min(slides.length - 1, i));
                if (slides[i]) smoothScrollTo(slides[i].offsetTop, 1000);
            };

            const setActiveDot = (i) => {
                scrollNav.querySelectorAll('.nav-dot').forEach((d, di) => d.classList.toggle('active', di === i));
            };

            const buildNav = () => {
                scrollNav.innerHTML = '';
                getSlides().forEach((slide, i) => {
                    const dot = document.createElement('div');
                    dot.className = 'nav-dot' + (i === currentIndex ? ' active' : '');
                    dot.setAttribute('data-index', i);
                    dot.setAttribute('data-label', labelFor(slide, i));
                    dot.addEventListener('click', () => goTo(i));
                    scrollNav.appendChild(dot);
                });
            };

            const moveSlide = (slide, dir) => {
                const slides = getSlides();
                const i = slides.indexOf(slide);
                const j = i + dir;
                if (j < 0 || j >= slides.length) return;
                if (dir < 0) slide.parentNode.insertBefore(slide, slides[j]);
                else slide.parentNode.insertBefore(slides[j], slide);
                refresh();
                saveState();
                setTimeout(() => smoothScrollTo(slide.offsetTop, 800), 50);
            };

            const ensureSlideControls = (slide) => {
                if (slide.querySelector('.slide-controls')) return;
                const bar = document.createElement('div');
                bar.className = 'slide-controls';
                const mk = (icon, title, cls, fn) => {
                    const b = document.createElement('button');
                    b.className = 'slide-ctrl' + (cls ? ' ' + cls : '');
                    b.title = title;
                    b.innerHTML = '<i class="fa-solid ' + icon + '"></i>';
                    b.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
                    return b;
                };
                bar.appendChild(mk('fa-chevron-up', 'הזז למעלה', '', () => moveSlide(slide, -1)));
                bar.appendChild(mk('fa-chevron-down', 'הזז למטה', '', () => moveSlide(slide, 1)));
                bar.appendChild(mk('fa-xmark', 'מחק שקופית', 'del', () => {
                    if (getSlides().length <= 1) return;
                    if (!confirm('למחוק את השקופית הזו?')) return;
                    slide.remove();
                    refresh();
                    saveState();
                }));
                slide.appendChild(bar);
            };

            const setEditable = (on) => {
                getSlides().forEach(s => {
                    const panel = s.querySelector('.cyber-panel');
                    if (panel) panel.setAttribute('contenteditable', on ? 'true' : 'false');
                });
            };

            const refresh = () => {
                const slides = getSlides();
                if (observer) observer.disconnect();
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('in-view');
                            currentIndex = getSlides().indexOf(entry.target);
                            setActiveDot(currentIndex);
                            try { sessionStorage.setItem(POS_KEY, currentIndex); } catch (e) {}
                        }
                    });
                }, { root: mainContainer, rootMargin: '0px', threshold: 0.5 });
                slides.forEach(s => { observer.observe(s); ensureSlideControls(s); });
                buildNav();
                setEditable(editMode);
                applyGlossary();
            };

            const addSlide = () => {
                const slides = getSlides();
                const section = document.createElement('section');
                section.className = 'slide';
                const darkT = (document.documentElement.dataset.template || 'dark') === 'dark';
                section.innerHTML =
                    '<div class="cyber-panel"' + (editMode ? ' contenteditable="true"' : '') + '>' +
                    '<h2 class="text-4xl md:text-5xl font-bold mb-6 glow-text-cyan">כותרת חדשה</h2>' +
                    '<p class="text-lg leading-relaxed ' + (darkT ? 'text-slate-300' : 'text-slate-600') + '">טקסט רגיל — לחצו כאן כדי לערוך.</p>' +
                    '</div>';
                // Insert before the last slide so the closing (QR) slide stays last
                const last = slides[slides.length - 1];

                else mainContainer.appendChild(section);

                setTimeout(() => smoothScrollTo(section.offsetTop, 800), 50);

            const addBlock = () => {
                const slide = getSlides()[currentIndex];
                if (!slide) return;
                const panel = slide.querySelector('.cyber-panel');
                if (!panel) return;
                const block = document.createElement('div');
                const dark = (document.documentElement.dataset.template || 'dark') === 'dark';
                block.className = 'tech-box mt-4';
                block.innerHTML =
                    '<h3 class="text-xl font-bold mb-2 ' + (dark ? 'text-white' : 'text-slate-800') + '">כותרת אזור</h3>' +
                    '<p class="text-sm ' + (dark ? 'text-slate-300' : 'text-slate-600') + '">טקסט — לחצו כאן כדי לערוך.</p>';
                panel.appendChild(block);

            };

            // Wrap the current text selection in a glow span
            const applyGlow = (cls) => {
                const sel = window.getSelection();
                if (!sel || !sel.rangeCount || sel.isCollapsed) return;
                const range = sel.getRangeAt(0);
                const span = document.createElement('span');
                span.className = cls;
                try {
                    range.surroundContents(span);

                    span.appendChild(range.extractContents());

            const removeGlow = () => {

                docClone.querySelectorAll('.slide-controls, .print-glossary').forEach(b => b.remove());
                docClone.querySelectorAll('.term').forEach(t => t.replaceWith(document.createTextNode(t.textContent)));
                const navClone = docClone.querySelector('#scrollNav');

            document.addEventListener('click', (e) => {

            const buildPrintGlossaries = () => {
                getSlides().forEach(slide => {
                    const old = slide.querySelector('.print-glossary');
                    if (old) old.remove();
                    const terms = Array.from(slide.querySelectorAll('.term'));
                    if (!terms.length) return;
                    const seen = new Set();
                    const items = [];
                    terms.forEach(t => {
                        const key = t.getAttribute('data-term');
                        if (seen.has(key)) return;
                        seen.add(key);
                        items.push('<li><strong>' + t.textContent + '</strong> — ' + (t.getAttribute('data-tip') || '') + '</li>');
                    });

                    const box = document.createElement('div');
                    box.className = 'print-glossary';
                    box.innerHTML = '<h4>מילון מונחים בשקופית זו</h4><ul>' + items.join('') + '</ul>';
                    (slide.querySelector('.cyber-panel') || slide).appendChild(box);
                });
            };

            // Export to PDF (via browser print). Exits edit mode first for a clean output.
            const exportBtn = document.getElementById('exportPdf');
            exportBtn.addEventListener('click', () => {
                if (editMode) {
                    editMode = false;

            // גלילה עם הגלגלת — סקשן אחד בכל תנועה, באנימציה רכה ומבוקרת (~1ש', האטה בהתחלה ובסוף)
            mainContainer.addEventListener('wheel', (e) => {

                e.preventDefault();

                }
            });

        // ===== תמונות / לוגו — העלאה מהמחשב או הדבקה (Ctrl+V) =====
        function downscaleImage(dataUrl, cb) {
            const img = new Image();
            img.onload = function () {
                const MAX = 1200;
                const w = img.naturalWidth, h = img.naturalHeight;
                if (Math.max(w, h) <= MAX && dataUrl.length < 700000) { cb(dataUrl); return; }
                const scale = Math.min(1, MAX / Math.max(w, h));
                const cw = Math.round(w * scale), ch = Math.round(h * scale);
                const canvas = document.createElement('canvas'); canvas.width = cw; canvas.height = ch;
                canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);

                try { cb(canvas.toDataURL(isPng ? 'image/png' : 'image/jpeg', 0.85)); } catch (e) { cb(dataUrl); }

            img.onerror = function () { cb(dataUrl); };
            img.src = dataUrl;

            const mid = window.innerHeight / 2;
            const slide = slides.find(function (s) { const r = s.getBoundingClientRect(); return r.top <= mid && r.bottom >= mid; }) || slides[0];
            const p = slide && slide.querySelector('.cyber-panel');
            if (p) { const d = document.createElement('div'); d.className = 'text-center mt-4'; d.innerHTML = html; p.appendChild(d); }
        }
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
        fileInput.addEventListener('change', function () {
            const f = fileInput.files && fileInput.files[0];
            if (f) fileToImage(f, insertImage);
            fileInput.value = '';
        });
        document.body.appendChild(fileInput);
        tbBtn('<i class="fa-solid fa-image"></i>', 'העלאת תמונה / לוגו', function () { fileInput.click(); });

        document.addEventListener('paste', function (e) {
            if (!document.body.classList.contains('edit-mode')) return;
            const items = (e.clipboardData && e.clipboardData.items) || [];
            for (let i = 0; i < items.length; i++) {
                if (items[i].type && items[i].type.indexOf('image') === 0) {
                    const file = items[i].getAsFile();
                    if (file) { e.preventDefault(); fileToImage(file, insertImage); return; }
                }
            }
        });

        // ===== זוהר חכם — מזהה זוהר קיים, מתחלף בין החלה/ביטול, עם צבע לבחירה =====
        const GLOW_CLASSES = ['glow-text', 'glow-text-cyan', 'glow-text-emerald'];
        function findGlow(node) {
            while (node && node !== document.body) {
                if (node.nodeType === 1 && node.classList && GLOW_CLASSES.some(function (c) { return node.classList.contains(c); })) return node;
                node = node.parentNode;
            }
            return null;
        }
        function glowColorOf(el) {
            if (el.classList.contains('glow-text-cyan')) return '#00f3ff';
            if (el.classList.contains('glow-text-emerald')) return '#00ff9d';
            const c = (el.style.getPropertyValue('--glow-color') || '').trim();
            return normalizeHex(c || '#00f3ff');
        }
        function stripGlowFrom(node) {
            node.classList.remove('glow-text', 'glow-text-cyan', 'glow-text-emerald');
            if (node.classList.length === 0) node.removeAttribute('class');
            node.style.removeProperty('--glow-color');
            if (node.getAttribute('style') === '') node.removeAttribute('style');
            // אם זה span עטיפה שלנו בלי שום תפקיד אחר — נפרק אותו
            if (node.tagName === 'SPAN' && !node.attributes.length) {
                const parent = node.parentNode;
                while (node.firstChild) parent.insertBefore(node.firstChild, node);
                parent.removeChild(node);
            }
        }
        function wrapGlow(color) {
            const sel = window.getSelection();
            if (!sel || !sel.rangeCount || sel.isCollapsed) return;
            const range = sel.getRangeAt(0);
            const span = document.createElement('span');
            span.className = 'glow-text';
            span.style.setProperty('--glow-color', color);
            try { range.surroundContents(span); }
            catch (e) { span.appendChild(range.extractContents()); range.insertNode(span); }
            sel.removeAllRanges();
        }
        const glowGroup = document.createElement('span');
        glowGroup.style.cssText = 'display:inline-flex;gap:0.4rem;flex-wrap:nowrap;align-items:center;';
        const glowBtn = document.createElement('button');
        glowBtn.className = 'glow-btn'; glowBtn.innerHTML = '✦ זוהר'; glowBtn.title = 'הוסף/הסר זוהר על הטקסט המסומן';
        glowBtn.addEventListener('mousedown', function (e) { e.preventDefault(); });
        glowBtn.addEventListener('click', function (e) {
            e.preventDefault();
            restoreSel();
            const sel = window.getSelection();
            const node = sel && sel.rangeCount ? findGlow(sel.anchorNode) : null;
            if (node) stripGlowFrom(node);
            else wrapGlow(glowColor.value);
            updateGlowState();
        });
        const glowColor = document.createElement('input');
        glowColor.type = 'color'; glowColor.title = 'צבע הזוהר'; glowColor.value = '#00f3ff';
        glowColor.addEventListener('mousedown', function (e) { e.stopPropagation(); });
        glowColor.addEventListener('input', function () {
            restoreSel();
            const sel = window.getSelection();
            const node = sel && sel.rangeCount ? findGlow(sel.anchorNode) : null;
            if (node) {
                node.classList.remove('glow-text-cyan', 'glow-text-emerald');
                node.classList.add('glow-text');
                node.style.setProperty('--glow-color', glowColor.value);
            } else {
                wrapGlow(glowColor.value);
            }
            updateGlowState();
        });
        glowGroup.appendChild(glowBtn);
        glowGroup.appendChild(glowColor);
        toolbar.appendChild(glowGroup);
        function updateGlowState() {
            let g = null;
            if (lastRange) { let n = lastRange.commonAncestorContainer; n = n.nodeType === 1 ? n : n.parentElement; g = findGlow(n); }
            if (g) { glowBtn.classList.add('glow-active'); glowBtn.innerHTML = '✦ בטל זוהר'; glowColor.value = glowColorOf(g); }
            else { glowBtn.classList.remove('glow-active'); glowBtn.innerHTML = '✦ זוהר'; }
        }

        function splitCols(n) {
            const slides = [].slice.call(document.querySelectorAll('.slide'));
            const mid = window.innerHeight / 2;
            const slide = slides.find(function (s) { const r = s.getBoundingClientRect(); return r.top <= mid && r.bottom >= mid; }) || slides[0];
            if (!slide) return;
            const panel = slide.querySelector('.cyber-panel');
            if (!panel) return;
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-' + n + ' gap-4 mt-4';
            for (let i = 0; i < n; i++) {
                const c = document.createElement('div');
                c.className = 'tech-box';
                c.innerHTML = '<h3 class="text-lg font-bold mb-2">כותרת</h3><p class="text-sm">טקסט — לחצו לעריכה.</p>';
                grid.appendChild(c);
            }
            panel.appendChild(grid);
        }
        tbBtn('▦2', '2 עמודות', function () { splitCols(2); });
        tbBtn('▦3', '3 עמודות', function () { splitCols(3); });
        tbBtn('▦4', '4 עמודות', function () { splitCols(4); });

        const ICONS = ['fa-star','fa-check','fa-circle-check','fa-bolt','fa-lightbulb','fa-rocket','fa-gear','fa-heart','fa-shield-halved','fa-database','fa-robot','fa-comment','fa-magnifying-glass','fa-wand-magic-sparkles','fa-arrow-left','fa-arrow-right'];
        const picker = document.createElement('div');
        picker.className = 'icon-picker';
        ICONS.forEach(function (ic) {
            const b = document.createElement('button');
            b.innerHTML = '<i class="fa-solid ' + ic + '"></i>';
            b.addEventListener('mousedown', function (e) { e.preventDefault(); });
            b.addEventListener('click', function () {
                restoreSel();
                document.execCommand('insertHTML', false, '<i class="fa-solid ' + ic + '"></i> ');
                picker.classList.remove('open');
            });
            picker.appendChild(b);
        });
        document.body.appendChild(picker);
        tbBtn('<i class="fa-solid fa-icons"></i>', 'הוסף אייקון', function () { picker.classList.toggle('open'); });
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.icon-picker') && !(e.target.closest('button') && e.target.closest('button').title === 'הוסף אייקון')) picker.classList.remove('open');
        });
    })();
    </script>
</body>
</html>
