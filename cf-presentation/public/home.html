<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מצגות — Nextli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan:#00f3ff; --neon-purple:#bc13fe; --neon-emerald:#00ff9d; --dark-bg:#030712; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Varela Round','Heebo',sans-serif; background:var(--dark-bg); color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; overflow-x:hidden; }
        .orb { position:fixed; border-radius:50%; filter:blur(100px); z-index:0; opacity:0.4; }
        .orb1 { width:40vw; height:40vw; background:radial-gradient(circle,var(--neon-purple) 0%,transparent 70%); top:-10%; right:-10%; }
        .orb2 { width:35vw; height:35vw; background:radial-gradient(circle,var(--neon-cyan) 0%,transparent 70%); bottom:-10%; left:-10%; }
        .panel { position:relative; z-index:10; width:100%; max-width:640px; background:rgba(10,15,30,0.5); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-top:1px solid rgba(0,243,255,0.3); border-bottom:1px solid rgba(188,19,254,0.3); border-radius:24px; padding:2.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.7); }
        .glow { color:#fff; text-shadow:0 0 10px var(--neon-cyan),0 0 20px rgba(0,243,255,0.5); }
        input { font-family:inherit; }
        .deck-link { transition:all .2s; }
        .deck-link:hover { border-color:var(--neon-cyan) !important; color:var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="panel">
        <div class="text-[var(--neon-cyan)] font-bold tracking-widest mb-2 text-sm uppercase"><i class="fa-solid fa-layer-group ml-2"></i>Nextli // מצגות</div>
        <h1 class="text-4xl md:text-5xl font-black mb-2 glow">בונה המצגות</h1>
        <p class="text-slate-400 mb-8">צרו מצגת חדשה או המשיכו לערוך מצגת קיימת. כל מצגת נשמרת בענן עם כתובת משלה.</p>

        <!-- Create new -->
        <div class="mb-8">
            <label class="block text-sm text-slate-300 mb-2 font-semibold">שם מצגת חדשה</label>
            <div class="flex gap-2">
                <input id="deckName" type="text" placeholder="למשל: my-talk" class="flex-1 bg-black/40 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[var(--neon-cyan)]">
                <button id="createBtn" class="bg-[var(--neon-cyan)] hover:bg-cyan-400 text-slate-900 font-bold px-6 rounded-xl transition-all whitespace-nowrap"><i class="fa-solid fa-plus ml-1"></i>צור / פתח</button>
            </div>
            <div class="mt-3">
                <div class="text-xs text-slate-400 mb-2">עיצוב</div>
                <div class="grid grid-cols-2 gap-2">
                    <label class="tmpl-opt cursor-pointer rounded-xl border border-slate-700 bg-black/30 p-3 flex items-center gap-2 has-[:checked]:border-[var(--neon-cyan)] has-[:checked]:bg-cyan-900/20">
                        <input type="radio" name="tmpl" value="dark" class="accent-[var(--neon-cyan)]" checked>
                        <span class="text-slate-200 text-sm">🌑 כהה (ניאון)</span>
                    </label>
                    <label class="tmpl-opt cursor-pointer rounded-xl border border-slate-700 bg-black/30 p-3 flex items-center gap-2 has-[:checked]:border-[var(--neon-emerald)] has-[:checked]:bg-emerald-900/20">
                        <input type="radio" name="tmpl" value="light" class="accent-[var(--neon-emerald)]">
                        <span class="text-slate-200 text-sm">☀️ בהיר (glass)</span>
                    </label>
                </div>
            </div>
            <p class="text-xs text-slate-500 mt-2">השם הופך לכתובת: slide.nextli.co.il/<span id="preview" class="text-[var(--neon-cyan)]">my-talk</span></p>
        </div>

        <!-- Existing decks -->
        <div>
            <div class="text-sm text-slate-300 mb-3 font-semibold">מצגות קיימות</div>
            <div id="deckList" class="space-y-2 text-slate-400 text-sm">טוען…</div>
        </div>
    </div>

    <script>
        const slugify = (s) => s.trim().replace(/\s+/g, '-');
        const nameInput = document.getElementById('deckName');
        const preview = document.getElementById('preview');
        const goToDeck = () => {
            const slug = slugify(nameInput.value);
            if (!slug) { nameInput.focus(); return; }
            const tmpl = (document.querySelector('input[name="tmpl"]:checked') || {}).value || 'dark';
            location.href = '/' + encodeURIComponent(slug) + '?t=' + tmpl;
        };
        nameInput.addEventListener('input', () => { preview.textContent = slugify(nameInput.value) || 'my-talk'; });
        nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') goToDeck(); });
        document.getElementById('createBtn').addEventListener('click', goToDeck);

        // Load existing decks
        async function loadDecks() {
            const list = document.getElementById('deckList');
            try {
                const res = await fetch('/api/decks', { cache: 'no-store' });
                const data = await res.json();
                const decks = (data && data.decks) || [];
                if (!decks.length) { list.innerHTML = '<div class="text-slate-500">אין עדיין מצגות שמורות — צרו אחת למעלה.</div>'; return; }
                list.innerHTML = '';
                decks.forEach(d => {
                    const name = (typeof d === 'string') ? d : d.name;
                    const custom = (typeof d === 'object') && d.custom;
                    const tmpl = (typeof d === 'object') && d.template;
                    const badge = tmpl === 'light'
                        ? '<span class="text-xs px-2 py-0.5 rounded-full bg-amber-400/15 text-amber-300 border border-amber-400/30 mr-2">☀️ בהיר</span>'
                        : '<span class="text-xs px-2 py-0.5 rounded-full bg-cyan-400/10 text-[var(--neon-cyan)] border border-cyan-400/30 mr-2">🌑 כהה</span>';
                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-2';
                    const a = document.createElement('a');
                    a.href = '/' + encodeURIComponent(name);
                    a.className = 'deck-link flex-1 flex items-center bg-black/40 border border-slate-700 rounded-xl px-4 py-3 text-slate-200';
                    a.innerHTML = '<i class="fa-solid fa-display ml-2 text-[var(--neon-emerald)]"></i>' + badge + '<span class="flex-1">' + name + (custom ? ' <span class="text-xs text-slate-500">(מובנית)</span>' : '') + '</span>';
                    row.appendChild(a);
                    if (!custom) {
                        const del = document.createElement('button');
                        del.title = 'מחק מצגת';
                        del.className = 'shrink-0 w-11 rounded-xl border border-red-500/40 bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-all';
                        del.innerHTML = '<i class="fa-solid fa-trash"></i>';
                        del.addEventListener('click', () => deleteDeck(name));
                        row.appendChild(del);
                    }
                    list.appendChild(row);
                });
            } catch (e) {
                list.innerHTML = '<div class="text-slate-500">לא ניתן לטעון רשימה כרגע.</div>';
            }
        }
        async function deleteDeck(name) {
            const pw = prompt('הקוד למחיקת המצגת "' + name + '":');
            if (!pw) return;
            try {
                const res = await fetch('/' + encodeURIComponent(name) + '/api/content', { method: 'DELETE', headers: { 'x-edit-password': pw } });
                if (res.status === 200) { loadDecks(); }
                else if (res.status === 401) alert('קוד שגוי — המצגת לא נמחקה.');
                else if (res.status === 403) alert('לא ניתן למחוק מצגת מובנית.');
                else alert('המחיקה נכשלה.');
            } catch (e) { alert('שגיאה במחיקה.'); }
        }
        loadDecks();
    </script>
</body>
</html>
